<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Káwe - El Despertar del Origen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">    
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <main class="zine-container">              
        <section id="page-1" class="zine-page active">
            <div class="bg-decoraciones">
              <svg class="svg-montana montana-fondo" viewBox="0 0 100 100" preserveAspectRatio="none">
                  <path d="M0,100 L0,40 L30,10 L60,50 L100,20 L100,100 Z" fill="var(--color-selva-oscura)" opacity="0.5"/>
              </svg>
              <svg class="svg-montana montana-frente" viewBox="0 0 100 100" preserveAspectRatio="none">
                  <path d="M0,100 L20,60 L40,80 L70,30 L100,50 L100,100 Z" fill="var(--color-selva-clara)" opacity="0.7"/>
              </svg>
              <svg class="svg-ave ave-1" viewBox="0 0 100 100">
                  <path d="M10,40 Q30,20 50,40 Q70,60 90,40 Q70,45 50,60 Q30,45 10,40 Z" fill="var(--color-fondo-base)" opacity="0.6"/>
              </svg>
              
              <svg class="svg-ave ave-2" viewBox="0 0 100 100">
                  <path d="M20,50 Q40,35 60,50 Q80,65 100,50 Q80,55 60,70 Q40,55 20,50 Z" fill="var(--color-fondo-base)" opacity="0.4"/>
              </svg>
              
              <svg class="svg-hoja hoja-izq" viewBox="0 0 100 100">
                  <path d="M10,100 Q10,40 50,10 Q60,30 10,100 Z" fill="var(--color-fondo-secundario)" opacity="0.4"/>
              </svg>
              <svg class="svg-hoja hoja-der" viewBox="0 0 100 100">
                  <path d="M90,100 Q90,40 50,10 Q40,30 90,100 Z" fill="var(--color-fondo-secundario)" opacity="0.4"/>
              </svg>
          </div>              
            <div id="lottie-portada" class="lottie-container"></div>            
            <h1 class="titulo-intriga">El origen está <br> despertando...</h1>            
            <button id="btn-entrar" class="btn-umbral">
                Cruzar el umbral 
                <span class="material-symbols-outlined icono-flecha">arrow_right_alt</span>
            </button>
        </section>

        <section id="page-2" class="zine-page" style="display: none; opacity: 0;">
            
            <div class="territorio-texto">
                <h2 class="titulo-seccion">El Piedemonte</h2>
                <div class="linea-decorativa"></div>
                <p class="parrafo-zine">
                    Donde los Andes se rinden ante la inmensidad verde. En <strong>Villagarzón</strong>, 
                    la altura de la montaña abraza la humedad de la selva para cultivar nuestra esencia.
                </p>
                <p class="parrafo-zine acento">
                    Un portal entre dos mundos.
                </p>
            </div>

            <div class="territorio-visual">
                <div id="lottie-territorio" class="lottie-container"></div>
            </div>

            <div class="territorio-rio">
                <svg class="svg-rio" viewBox="0 0 100 400" preserveAspectRatio="xMidYMax slice">
                    <path class="path-rio" 
                          d="M50,0 Q80,50 40,100 T60,200 T30,300 T50,400" 
                          fill="none" 
                          stroke="var(--color-acento-principal)" 
                          stroke-width="2" 
                          stroke-linecap="round"/>
                </svg>
            </div>

        </section>
        <nav id="zine-nav" class="zine-nav" style="display: none; opacity: 0;">
            
            <button id="btn-prev" class="nav-arrow" title="Volver">
                <span class="material-symbols-outlined">arrow_back</span>
            </button>
            
            <span id="nav-indicador" class="nav-indicator">02 / 05</span>
            
            <button id="btn-next" class="nav-arrow" title="Avanzar">
                <span class="material-symbols-outlined">arrow_forward</span>
            </button>

        </nav>
    </main>
    

    <audio id="audio-selva" autoplay autoloop>
        <source src="./assets/audio/jungle-quiet.wav" type="audio/wav">
    </audio>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="./js/gsapAnimations.js"></script>    
    <script src="./js/main.js"></script>
</body>
</html>
